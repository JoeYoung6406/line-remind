name: 每日計畫發送

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 台灣時間 06:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (截圖但不發 LINE)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Take screenshot
        run: python daily_plan.py

      - name: Commit screenshot to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plan.png
          git diff --staged --quiet || git commit -m "Daily plan $(date +%Y-%m-%d)"
          git push

      - name: Wait for GitHub CDN
        run: sleep 30

      - name: Send LINE message
        if: ${{ inputs.dry_run != true }}
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_TOKEN_B: ${{ secrets.LINE_TOKEN_B }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
        run: python send_daily.py
