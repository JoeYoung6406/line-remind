name: LINE 聚會提醒

on:
  schedule:
    - cron: '0 11 * * 2'  # 每週二 UTC 11:00 = 台灣時間 19:00
  workflow_dispatch:       # 允許手動觸發測試

permissions:
  contents: write          # 發送後把結果寫回 SEND_LOG.md

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run reminder
        id: send
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
        run: python remind.py

      - name: Record send log
        if: always() && steps.send.outcome != 'skipped'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "| $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') | ${{ github.workflow }} | ${{ github.event_name }} | ${{ steps.send.outcome }} |" >> SEND_LOG.md
          git add SEND_LOG.md
          git commit -m "log: 發送紀錄 $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
